name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyflakes vulture

      - name: Run backend tests
        working-directory: backend
        run: PYTHONPATH=$(pwd) pytest -q

      - name: Lint backend with pyflakes
        run: python -m pyflakes backend/app backend/tests

      - name: Scan dead code with vulture
        run: python -m vulture backend/app backend/tests --min-confidence 80

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run backend smoke test
        run: python scripts/smoke_backend.py
