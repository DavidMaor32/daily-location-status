name: Build and Push Docker Images (dev)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev
    types:
      - closed

jobs:
  docker:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/daily-location-status-backend:dev
            ${{ secrets.DOCKERHUB_USERNAME }}/daily-location-status-backend:dev-${{ steps.vars.outputs.sha_short }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/daily-location-status-frontend:dev
            ${{ secrets.DOCKERHUB_USERNAME }}/daily-location-status-frontend:dev-${{ steps.vars.outputs.sha_short }}
