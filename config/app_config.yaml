# ------------------------------------------------------------
# Main application configuration (loaded at backend startup)
# All non-secret settings are centralized in this YAML file
# ------------------------------------------------------------

app:
  name: "Daily Status Manager API" # Service display/logging name | Example: "Daily Status Manager API"
  environment: "development" # Runtime environment | Example: "development" / "production"

cors:
  origins:
    - "http://localhost:5173" # Allowed frontend origin for API calls | Example: "http://localhost:5173"

frontend:
  api_base_url: "" # Browser API base URL (empty = use relative /api) | Example: ""
  dev_server_port: 5173 # Frontend dev server port (Vite) | Example: 5173
  dev_proxy_target: "http://localhost:8000" # Vite proxy target for /api in development | Example: "http://localhost:8000"

storage:
  mode: "local" # Storage mode: local / s3 / local_and_s3 | Example: "local_and_s3"

  local_storage_dir: "./backend/local_storage" # Local Excel storage root path | Example: "./backend/local_storage"

  seed_people_file: "./backend/data/sample_people.xlsx" # Initial people Excel file (used only when master file does not exist) | Example: "./backend/data/sample_people.xlsx"
  snapshot_restore_policy: "exact_snapshot" # Restore policy: exact_snapshot / master_only
  s3:
    snapshots_prefix: "snapshots" # S3 logical folder for daily snapshots | Example: "snapshots"
    master_key: "master/people_master.xlsx" # S3 key for people master Excel | Example: "master/people_master.xlsx"
    locations_key: "master/locations.xlsx" # S3 key for locations Excel | Example: "master/locations.xlsx"
    bucket_name: "" # S3 bucket name (required in s3/local_and_s3 modes) | Example: "my-status-bucket"

aws:
  access_key_id: "" # AWS Access Key ID | Example: "AKIA..."
  secret_access_key: "" # AWS Secret Access Key | Example: "xxxxxxxxxxxx"
  session_token: "" # Temporary AWS session token (optional) | Example: "IQoJb3Jp..."
  region: "us-east-1" # AWS region for S3 operations | Example: "us-east-1"

telegram:
  enabled: true # Enable/disable Telegram bot integration | Example: true
  bot_token: "" # Keep empty in git. Put real token in .env as TELEGRAM_BOT_TOKEN
  allowed_chat_ids: [] # Allowed Telegram chat IDs (empty = no chat restriction) | Example: [123456789, 987654321]
  allowed_remote_names: [] # Allowed names for remote self-report (empty = any name allowed) | Example: ["Yossi Cohen", "Michal Levi"]
  poll_timeout_seconds: 25 # Telegram polling timeout in seconds | Example: 25
  poll_retry_seconds: 3 # Delay between polling retries after errors | Example: 3
