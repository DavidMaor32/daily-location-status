# End-to-end test configuration for isolated app and backend execution.
# Responsibility: provide deterministic runtime settings used by automated E2E flows.

app:
  name: "Daily Status Manager API (E2E)"
  environment: "development"

cors:
  origins:
    - "http://127.0.0.1:4173"
    - "http://localhost:4173"

frontend:
  api_base_url: ""
  dev_server_port: 4173
  dev_proxy_target: "http://127.0.0.1:39011"

storage:
  mode: "local"
  local_storage_dir: "./backend/e2e_storage"
  seed_people_file: "./backend/data/e2e_people.csv"
  snapshot_restore_policy: "exact_snapshot"
  s3:
    snapshots_prefix: "snapshots"
    master_key: "master/people_master.xlsx"
    locations_key: "master/locations.xlsx"
    bucket_name: ""

aws:
  access_key_id: ""
  secret_access_key: ""
  session_token: ""
  region: "us-east-1"

telegram:
  enabled: false
  bot_token: ""
  allowed_chat_ids: []
  allowed_remote_names: []
  poll_timeout_seconds: 25
  poll_retry_seconds: 3
