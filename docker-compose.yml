services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: daily-status-api
    restart: always
    env_file: .env
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/data:/app/data
    networks:
      - daily_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: daily-status-ui
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - backend
    restart: always
    networks:
      - daily_network

# זה החלק שהיה חסר וגרם לשגיאה:
networks:
  daily_network:
    driver: bridge

volumes:
  pgdata: