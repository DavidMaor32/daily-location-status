version: '3.8'

services:
  backend:
    build: ./backend
    container_name: daily-status-api
    restart: always
    env_file: .env
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/data:/app/data
    networks:
      - daily_network

  frontend:
    build:
      context: .              # הנקודה אומרת "תסתכל על כל הפרויקט"
      dockerfile: frontend/Dockerfile
    container_name: daily-status-ui
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - backend
    restart: always
    networks:
      - daily_network