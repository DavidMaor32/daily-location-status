services:
  db:
    image: mysql:8.1
    container_name: my_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: daily_status
      MYSQL_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - daily_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: mysql://root:admin@db:3306/daily_status
    container_name: daily-status-api
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - daily_network
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/data:/app/data
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: daily-status-ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - daily_network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: daily-status-gateway
    restart: always
    ports:
      - "8070:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - daily_network

networks:
  daily_network:
    driver: bridge

volumes:
  db_data:
