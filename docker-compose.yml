services:
  db:
    image: mysql:8.1
    container_name: my_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: daily_status
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - daily_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: daily-status-api
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - daily_network
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL}
        FRONTEND_DEV_SERVER_PORT: ${FRONTEND_DEV_SERVER_PORT}
        FRONTEND_DEV_PROXY_TARGET: ${FRONTEND_DEV_PROXY_TARGET}
    container_name: daily-status-ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - daily_network

networks:
  daily_network:
    driver: bridge

volumes:
  db_data: