services:
  db:
    image: mysql:8.1
    container_name: my_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: daily_status
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - daily_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: daily-status-api
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - daily_network
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: daily-status-ui
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - backend
    restart: always
    networks:
      - daily_network

networks:
  daily_network:
    driver: bridge

volumes:
  db_data: