services:
  db:
    image: mariadb:11.4
    container_name: daily-status-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p$${DB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - daily_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: daily-status-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT}/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - daily_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL}
        FRONTEND_DEV_SERVER_PORT: ${FRONTEND_DEV_SERVER_PORT}
        FRONTEND_DEV_PROXY_TARGET: ${FRONTEND_DEV_PROXY_TARGET}
    container_name: daily-status-ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - daily_network

networks:
  daily_network:
    driver: bridge

volumes:
  db_data: